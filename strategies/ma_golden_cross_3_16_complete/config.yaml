# 完整版右侧均线金叉3穿25策略配置（回退到止损与止盈优化版）
# 修改日期: 2026-04-08
# 优化方向: 止损5% + ATR止盈2.5/4.0倍 + 仓位25%
strategy_params:
  # 均线参数
  ma_fast_period: 3       # 快速均线周期（3日）
  ma_slow_period: 25      # 慢速均线周期（16→25，更长周期更稳定）
  trend_ma_period: 20     # 趋势确认均线周期（20日）

  # 止损参数（给波动留出呼吸空间）
  stop_loss_percent: 5.0   # 5.0%（保持）
  recovery_days: 3          # 止损恢复天数（3日内无法收回则止损）

  # ATR止盈参数（推荐组合优化 - 提前锁定利润）
  atr_period: 14             # ATR周期
  atr_partial_mult: 2.5    # 2.5×ATR减半仓锁定利润
  atr_full_mult: 4.0       # 4.0×ATR完全止盈减少回吐

  # 乖离率参数（保持收紧）
  max_bias_for_holding: 15.0  # 15%（保持）

  # 选股参数（适度放宽）
  lookback_low_period: 30      # 近期低点回溯周期
  min_rebound_pct: 4.0       # 5%→4%（略放宽入场）
  max_rebound_pct: 25.0      # 25%（保持）
  volume_surge_ratio: 1.3      # 1.3（保持）
  volume_lookback: 20          # 成交量均线回溯周期
  volume_confirm_days: 3       # 放量确认天数
  max_pending_days: 20         # 20（保持）
  max_candidates: 25           # 20→25（略增加候选）

  # 过滤参数（保持）
  rsi_period: 14               # RSI周期
  rsi_threshold: 30            # 30（保持）
  use_rsi_filter: True        # 启用RSI过滤
  use_trend_filter: True       # 开启趋势过滤
  trend_confirmation_bars: 5    # 5（保持）
  use_rebound_filter: True    # 是否启用反弹过滤

  # 仓位参数（推荐组合优化）
  max_position_ratio: 0.25     # 0.20→0.25（25%仓位）

# 回测参数
backtest_params:
  start_date: "2020-01-01"
  end_date: "2025-12-31"
  initial_cash: 1000000
  commission_rate: 0.0003
